services:
  mysql:
    image: mysql:8.0
    container_name: check_sec_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-check_sec}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - check_sec_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: check_sec_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-check_sec}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /app/uploads
      TZ: Asia/Shanghai
    volumes:
      - upload_data:/app/uploads
    ports:
      - "9090:8080"   # 👈 加这一行！宿主机9090 → 容器8080
    networks:
      - check_sec_net

  frontend:
    build:
      context: ./Check_Sec-ui
      dockerfile: Dockerfile
    container_name: check_sec_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - check_sec_net

volumes:
  mysql_data:
  upload_data:

networks:
  check_sec_net:
    driver: bridge
