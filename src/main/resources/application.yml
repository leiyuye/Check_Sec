spring:
  application:
    name: Check_Sec
  datasource:
    url: jdbc:mysql://localhost:3306/check_sec?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080

app:
  jwt:
    secret: CheckSecFilingPlatformJwtSecretKey2026MustBeLongEnough
    expiration-ms: 86400000
  file:
    upload-dir: ./uploads
    max-size-mb: 50
    allowed-extensions: doc,docx,pdf,xls,xlsx,zip,rar
